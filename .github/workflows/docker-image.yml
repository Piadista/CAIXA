name: Docker CI/CD

on:
  push:
    branches: [ "main" ]

jobs:
  build-test-push:
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout do código
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Build da imagem
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKERHUB_USERNAME }}/my-postgres:latest .

      # 3. Teste Simples (Verificar se responde na porta 5432)
      - name: Test Docker image
        run: |
          # Sobe o container
          docker run -d --name test-db -e POSTGRES_PASSWORD=password -p 5432:5432 ${{ secrets.DOCKERHUB_USERNAME }}/my-postgres:latest
          
          # Aguarda alguns segundos para o DB inicializar
          sleep 10
          
          # Verifica se o container está rodando e a porta está aberta
          if docker exec test-db pg_isready -U postgres; then
            echo "Postgres está pronto e respondendo!"
            docker stop test-db && docker rm test-db
          else
            echo "Erro: Postgres não respondeu a tempo."
            docker stop test-db && docker rm test-db
            exit 1
          fi

      # 4. Login no Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 5. Push da imagem
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKERHUB_USERNAME }}/my-postgres:latest